kind = "web"
previewPath = "/"
title = "Kraken Watch"
version = "1.0.0"
id = "artifacts/krakenwatch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19288

[services.development]
run = "pnpm --filter @workspace/krakenwatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/krakenwatch", "run", "build" ]
publicDir = "artifacts/krakenwatch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19288"
BASE_PATH = "/"
