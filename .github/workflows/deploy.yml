name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Daily Data Refresh
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: krakenwatch-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For workflow_run triggers, always deploy the tip of main so that any
          # data commit pushed by Daily Data Refresh is included.  Using
          # head_sha would check out the commit that *triggered* the refresh,
          # which predates the fresh-data commit the refresh pushes to main.
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate deployment configuration invariants
        run: |
          # Workers is the canonical production target.
          test -f wrangler.workers.toml
          test -f src/worker.js
          # Pages redirect rules must never be uploaded in Workers mode.
          test -f public/.assetsignore
          grep -x '_redirects' public/.assetsignore

      - name: Validate ASSETS serving mode invariants
        run: |
          # Worker serves all static content from ASSETS binding — no CF Pages proxy.
          grep -Fx "run_worker_first = true" wrangler.workers.toml
          grep -F "env.ASSETS.fetch(request)" src/worker.js

      - name: Remove Pages-only redirect rules from Workers assets
        run: rm -f dist/_redirects

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@latest deploy --config wrangler.workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Restore last smoke-test status
        uses: actions/cache/restore@v4
        with:
          path: /tmp/smoke_last_status
          key: smoke-status-${{ github.run_number }}
          restore-keys: smoke-status-

      - name: Smoke-check production routes
        id: smoke_check
        run: |
          set -euo pipefail
          PROD_HOST="https://krakenwatch.com"
          WORKER_HOST="https://wispy-sun-811e.krakenwatch.workers.dev"

          echo "unknown" > /tmp/smoke_current_route
          trap 'cp /tmp/smoke_current_route /tmp/smoke_failed_route 2>/dev/null || true' ERR

          extract_signature() {
            local url="$1"
            local html title js css
            html="$(curl -fsSL "$url")"
            title="$(printf '%s' "$html" | grep -oE '<title>[^<]+</title>' | head -n1)"
            js="$(printf '%s' "$html" | grep -oE '/assets/index-[^"]+\.js' | head -n1)"
            css="$(printf '%s' "$html" | grep -oE '/assets/index-[^"]+\.css' | head -n1)"
            test -n "$title"
            test -n "$js"
            test -n "$css"
            printf '%s|%s|%s\n' "$title" "$js" "$css"
          }

          check_route() {
            local route="$1"
            echo "$route" > /tmp/smoke_current_route
            local prod_url="${PROD_HOST}${route}"
            local worker_url="${WORKER_HOST}${route}"
            local prod_status worker_status prod_sig worker_sig

            for attempt in 1 2 3 4 5; do
              prod_status="$(curl -fsSL -o /dev/null -w '%{http_code}' "$prod_url")"
              worker_status="$(curl -fsSL -o /dev/null -w '%{http_code}' "$worker_url")"
              test "$prod_status" = "200"
              test "$worker_status" = "200"

              prod_sig="$(extract_signature "$prod_url")"
              worker_sig="$(extract_signature "$worker_url")"

              if [ "$prod_sig" = "$worker_sig" ]; then
                return 0
              fi

              if [ "$attempt" -lt 5 ]; then
                sleep 6
              fi
            done

            echo "Signature mismatch on ${route}"
            echo "  production: ${prod_sig}"
            echo "  worker:     ${worker_sig}"
            echo "${route}" > /tmp/smoke_failed_route
            exit 1
          }

          check_route /
          check_route /prediction
          check_route /ink
          check_route /payward
          check_route /alpha-briefs
          check_route /about
          check_route /blog

          shopt -s nullglob
          brief_files=( src/content/briefs/*.js )
          post_count=0
          for brief_file in "${brief_files[@]}"; do
            slug="$(basename "$brief_file" .js)"
            [ "$slug" = "index" ] && continue
            check_route "/blog/${slug}"
            post_count=$((post_count + 1))
          done
          if [ "$post_count" -eq 0 ]; then
            echo "ERROR: No blog post files found in src/content/briefs/ — check the repository layout"
            exit 1
          fi

      - name: Notify Slack on smoke-test recovery
        if: steps.smoke_check.outcome == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set — skipping Slack notification"
            exit 0
          fi

          if [ ! -f /tmp/smoke_last_status ] || [ "$(cat /tmp/smoke_last_status)" != "failed" ]; then
            echo "Previous smoke-test was not a failure — skipping recovery notification"
            exit 0
          fi

          MESSAGE=":white_check_mark: *Smoke-test recovered* — the site is back to normal"

          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${MESSAGE}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${MESSAGE}\n<${RUN_URL}|View successful run>\"
                  }
                }
              ]
            }"

      - name: Notify Slack on smoke-test failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set — skipping Slack notification"
            exit 0
          fi

          if [ -f /tmp/smoke_failed_route ]; then
            FAILED_ROUTE="$(cat /tmp/smoke_failed_route)"
            MESSAGE=":rotating_light: *Smoke-test failed* on route \`${FAILED_ROUTE}\`"
          else
            MESSAGE=":rotating_light: *Smoke-test failed* (route could not be determined)"
          fi

          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${MESSAGE}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${MESSAGE}\n<${RUN_URL}|View failed run>\"
                  }
                }
              ]
            }"

      - name: Record smoke-test status
        if: steps.smoke_check.outcome == 'success' || steps.smoke_check.outcome == 'failure'
        run: |
          if [ "${{ steps.smoke_check.outcome }}" = "success" ]; then
            echo "success" > /tmp/smoke_last_status
          else
            echo "failed" > /tmp/smoke_last_status
          fi

      - name: Save smoke-test status
        if: steps.smoke_check.outcome == 'success' || steps.smoke_check.outcome == 'failure'
        uses: actions/cache/save@v4
        with:
          path: /tmp/smoke_last_status
          key: smoke-status-${{ github.run_number }}
