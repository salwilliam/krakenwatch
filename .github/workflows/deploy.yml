name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Daily Data Refresh
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: krakenwatch-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    name: Build & Deploy
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate build artifacts
        run: |
          test -f wrangler.workers.toml
          test -f src/worker.js
          test -f public/.assetsignore
          grep -x '_redirects' public/.assetsignore
          grep -Fx "run_worker_first = true" wrangler.workers.toml
          grep -F "env.ASSETS.fetch(request)" src/worker.js

      - name: Remove Pages-only redirect rules from Workers assets
        run: rm -f dist/_redirects

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@latest deploy --config wrangler.workers.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
