name: Daily Data Refresh

on:
  push:
    branches:
      - main
  schedule:
    # Run daily at 12:00 UTC.
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: krakenwatch-daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    name: Refresh site-data.json
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh site data
        run: npm run refresh:data

      - name: Commit and push refreshed data
        run: |
          set -euo pipefail
          if git diff --quiet -- public/site-data.json src/worker.js; then
            echo "No data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/site-data.json src/worker.js
          git commit -m "chore(data): daily refresh site-data"
          git push origin HEAD:main

      - name: Close staleness alert on recovery
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/close-staleness-alert.sh

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify-data-refresh-failure.sh
