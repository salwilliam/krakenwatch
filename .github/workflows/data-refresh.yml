name: Daily Data Refresh

on:
  push:
    branches:
      - main
  schedule:
    # Run every 4 hours.
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: krakenwatch-daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    name: Refresh site-data.json
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Refresh site data
        run: npm run refresh:data

      - name: Commit and push refreshed data
        run: |
          set -euo pipefail
          if git diff --quiet -- public/site-data.json src/worker.js; then
            echo "No data changes detected."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/site-data.json src/worker.js
            git commit -m "chore(data): daily refresh site-data"
            git push origin HEAD:main
          fi

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          rm -f dist/_redirects
          npx wrangler@latest deploy --config wrangler.workers.toml

      - name: Close staleness alert on recovery
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/close-staleness-alert.sh

      - name: Post daily traffic report
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash .github/scripts/daily-traffic-report.sh

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash .github/scripts/notify-data-refresh-failure.sh
