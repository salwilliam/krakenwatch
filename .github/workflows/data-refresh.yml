name: Daily Data Refresh

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: krakenwatch-daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    name: Refresh site-data.json
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh site data
        run: npm run refresh:data

      - name: Commit and push refreshed data
        run: |
          set -euo pipefail
          if git diff --quiet -- public/site-data.json src/worker.js; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/site-data.json src/worker.js
          git commit -m "chore(data): daily refresh site-data"
          git push origin HEAD:main

      - name: Close staleness alert on recovery
        id: close_staleness
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          LABEL="data-refresh-failure"

          EXISTING_ISSUES="$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 100 \
            --json number \
            --jq '.[].number' \
            --repo "$GITHUB_REPOSITORY")"

          if [ -n "$EXISTING_ISSUES" ]; then
            while IFS= read -r ISSUE_NUMBER; do
              gh issue comment "$ISSUE_NUMBER" \
                --body "The Daily Data Refresh recovered on $(date -u +'%Y-%m-%d %H:%M UTC'). Closing automatically. [View run]($RUN_URL)" \
                --repo "$GITHUB_REPOSITORY"
              gh issue close "$ISSUE_NUMBER" \
                --repo "$GITHUB_REPOSITORY"
            done <<< "$EXISTING_ISSUES"
            echo "issue_closed=true" >> "$GITHUB_OUTPUT"
          else
            echo "issue_closed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Daily Data Refresh failed - $(date -u +'%Y-%m-%d')"
          LABEL="data-refresh-failure"

          gh label create "$LABEL" \
            --description "Automated: daily data refresh workflow failure" \
            --color "d93f0b" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          EXISTING_ISSUES="$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 100 \
            --json number,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].number' \
            --repo "$GITHUB_REPOSITORY")"

          if [ -n "$EXISTING_ISSUES" ]; then
            while IFS= read -r ISSUE_NUMBER; do
              gh issue comment "$ISSUE_NUMBER" \
                --body "Workflow failed again on $(date -u +'%Y-%m-%d %H:%M UTC'). [View run]($RUN_URL)" \
                --repo "$GITHUB_REPOSITORY"
            done <<< "$EXISTING_ISSUES"

            MOST_RECENT="$(echo "$EXISTING_ISSUES" | head -1)"
            while IFS= read -r ISSUE_NUMBER; do
              if [ "$ISSUE_NUMBER" != "$MOST_RECENT" ]; then
                gh issue close "$ISSUE_NUMBER" \
                  --comment "Superseded by #${MOST_RECENT}. Closing to keep at most one open staleness issue at a time." \
                  --repo "$GITHUB_REPOSITORY"
              fi
            done <<< "$EXISTING_ISSUES"
          else
            gh issue create \
              --title "$TITLE" \
              --label "$LABEL" \
              --body "The Daily Data Refresh workflow failed. The live site may be serving stale data.

**Run:** $RUN_URL
**Time:** $(date -u +'%Y-%m-%d %H:%M UTC')

Please investigate and re-run the workflow once the issue is resolved." \
              --repo "$GITHUB_REPOSITORY"
          fi
