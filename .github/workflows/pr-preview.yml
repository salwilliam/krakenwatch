name: PR Live Preview (Canonical Only)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: krakenwatch-pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  canonical-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Validate Canonical Preview Path
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate canonical proxy invariants
        run: |
          set -euo pipefail
          grep -Fx "run_worker_first = true" wrangler.workers.toml
          grep -F "url.hostname = '1d2a3088.krakenwatch.pages.dev';" src/worker.js

      - name: Smoke-check canonical preview routes
        run: |
          set -euo pipefail
          PREVIEW_URL="https://wispy-sun-811e.krakenwatch.workers.dev"
          for route in / /ink /payward /alpha-briefs /about; do
            ok=0
            for attempt in 1 2 3 4 5 6; do
              code="$(curl -sSL -o /dev/null -w '%{http_code}' "${PREVIEW_URL}${route}")"
              if [ "$code" = "200" ]; then
                ok=1
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                sleep 5
              fi
            done

            if [ "$ok" -ne 1 ]; then
              echo "Canonical preview route did not become ready: ${route}"
              echo "Last status code: ${code}"
              exit 1
            fi
          done

  comment-preview:
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [canonical-preview]
    runs-on: ubuntu-latest
    name: Comment Preview URLs on PR
    permissions:
      pull-requests: write
    timeout-minutes: 10

    steps:
      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- krakenwatch-pr-preview -->';
            const body = `${marker}
            🔎 **PR Preview (Canonical Only)**

            - URL: https://wispy-sun-811e.krakenwatch.workers.dev
            - Codepath: \`wispy-sun-811e (canonical)\`
            - Smoke checks: passed (\`/\`, \`/ink\`, \`/payward\`, \`/alpha-briefs\`, \`/about\`)

            Feature preview links are disabled until source parity is restored.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Cleanup Preview
    timeout-minutes: 10

    steps:
      - name: No-op cleanup
        run: |
          echo "No ephemeral preview worker to clean up."
