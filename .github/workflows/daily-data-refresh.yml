name: Daily Data Refresh

on:
  schedule:
    # Run daily at 8:00 AM America/New_York (12:00 UTC during EDT, 13:00 UTC during EST).
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: krakenwatch-daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    name: Refresh site-data.json
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh site data
        run: npm run refresh:data

      - name: Commit and push refreshed data
        run: |
          set -euo pipefail
          if git diff --quiet -- public/site-data.json src/worker.js; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/site-data.json src/worker.js
          git commit -m "chore(data): daily refresh site-data"
          git push origin HEAD:main

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Daily Data Refresh failed — $(date -u +'%Y-%m-%d')"
          LABEL="data-refresh-failure"

          # Create the label if it doesn't already exist (idempotent).
          gh label create "$LABEL" \
            --description "Automated: daily data refresh workflow failure" \
            --color "d93f0b" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          # If an open issue with this label already exists, add a comment instead
          # of opening a duplicate.
          EXISTING="$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty' \
            --repo "$GITHUB_REPOSITORY")"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --body "Workflow failed again on $(date -u +'%Y-%m-%d %H:%M UTC'). [View run]($RUN_URL)" \
              --repo "$GITHUB_REPOSITORY"
          else
            gh issue create \
              --title "$TITLE" \
              --label "$LABEL" \
              --body "The **Daily Data Refresh** workflow failed. The live site may be serving stale data.

**Run:** $RUN_URL
**Time:** $(date -u +'%Y-%m-%d %H:%M UTC')

Please investigate and re-run the workflow once the issue is resolved. Close this issue when the refresh is confirmed healthy." \
              --repo "$GITHUB_REPOSITORY"
          fi
