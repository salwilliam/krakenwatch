name: Daily Data Refresh

on:
  schedule:
    # Run daily at 8:00 AM America/New_York (12:00 UTC during EDT, 13:00 UTC during EST).
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: krakenwatch-daily-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    name: Refresh site-data.json
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Refresh site data
        run: npm run refresh:data

      - name: Commit and push refreshed data
        run: |
          set -euo pipefail
          if git diff --quiet -- public/site-data.json src/worker.js; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/site-data.json src/worker.js
          git commit -m "chore(data): daily refresh site-data"
          git push origin HEAD:main

      - name: Close staleness alert on recovery
        id: close_staleness
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          LABEL="data-refresh-failure"

          # Find ALL open issues with this label to avoid orphaned duplicates.
          EXISTING_ISSUES="$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 100 \
            --json number \
            --jq '.[].number' \
            --repo "$GITHUB_REPOSITORY")"

          if [ -n "$EXISTING_ISSUES" ]; then
            while IFS= read -r ISSUE_NUMBER; do
              gh issue comment "$ISSUE_NUMBER" \
                --body "The **Daily Data Refresh** recovered successfully on $(date -u +'%Y-%m-%d %H:%M UTC'). Closing this issue automatically. [View run]($RUN_URL)" \
                --repo "$GITHUB_REPOSITORY"
              gh issue close "$ISSUE_NUMBER" \
                --repo "$GITHUB_REPOSITORY"
            done <<< "$EXISTING_ISSUES"
            echo "issue_closed=true" >> "$GITHUB_OUTPUT"
          else
            echo "issue_closed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack on data-refresh recovery
        if: success() && steps.close_staleness.outputs.issue_closed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set — skipping Slack notification"
            exit 0
          fi

          MESSAGE=":white_check_mark: *Daily Data Refresh recovered* — the staleness alert has been closed and the site is serving fresh data"

          curl -fsSL -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"${MESSAGE}\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${MESSAGE}\n<${RUN_URL}|View successful run>\"
                  }
                }
              ]
            }"

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="Daily Data Refresh failed — $(date -u +'%Y-%m-%d')"
          LABEL="data-refresh-failure"

          # Create the label if it doesn't already exist (idempotent).
          gh label create "$LABEL" \
            --description "Automated: daily data refresh workflow failure" \
            --color "d93f0b" \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

          # If any open issues with this label exist, add a comment to each instead
          # of opening a duplicate.
          EXISTING_ISSUES="$(gh issue list \
            --label "$LABEL" \
            --state open \
            --limit 100 \
            --json number \
            --jq '.[].number' \
            --repo "$GITHUB_REPOSITORY")"

          if [ -n "$EXISTING_ISSUES" ]; then
            while IFS= read -r ISSUE_NUMBER; do
              gh issue comment "$ISSUE_NUMBER" \
                --body "Workflow failed again on $(date -u +'%Y-%m-%d %H:%M UTC'). [View run]($RUN_URL)" \
                --repo "$GITHUB_REPOSITORY"
            done <<< "$EXISTING_ISSUES"
          else
            gh issue create \
              --title "$TITLE" \
              --label "$LABEL" \
              --body "The **Daily Data Refresh** workflow failed. The live site may be serving stale data.

**Run:** $RUN_URL
**Time:** $(date -u +'%Y-%m-%d %H:%M UTC')

Please investigate and re-run the workflow once the issue is resolved. Close this issue when the refresh is confirmed healthy." \
              --repo "$GITHUB_REPOSITORY"
          fi
